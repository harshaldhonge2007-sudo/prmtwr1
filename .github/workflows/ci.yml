name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Frontend Deps
        run: cd frontend && npm install
        
      - name: Install Backend Deps
        run: cd backend && npm install
        
      - name: Run Tests
        run: cd backend && npm test
