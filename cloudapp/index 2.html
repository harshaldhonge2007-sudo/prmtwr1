<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ElecGuide – Understand Elections in Minutes</title>
<meta name="description" content="Interactive guide to understanding Indian elections. Learn how to vote, explore timelines, and find polling info."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#e8f0fe 100%);min-height:100vh;color:#1e293b;transition:background .3s,color .3s}
body.dark{background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);color:#e2e8f0}
.glass{background:rgba(255,255,255,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.4);box-shadow:0 4px 24px rgba(0,0,0,.06)}
body.dark .glass{background:rgba(30,41,59,.75);border-color:rgba(255,255,255,.1);box-shadow:0 4px 24px rgba(0,0,0,.3)}
nav{position:sticky;top:0;z-index:100;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-size:1.4rem;font-weight:900;color:#4f46e5;display:flex;align-items:center;gap:8px;cursor:pointer;border:none;background:none}
.logo span{background:#4f46e5;color:#fff;padding:4px 8px;border-radius:8px;font-size:.85rem}
.nav-links{display:flex;gap:4px;flex-wrap:wrap}
.nav-btn{border:none;background:none;padding:8px 14px;border-radius:10px;font-size:.85rem;font-weight:500;color:#64748b;cursor:pointer;transition:all .2s;font-family:inherit}
.nav-btn:hover,.nav-btn.active{background:#ede9fe;color:#4f46e5}
body.dark .nav-btn{color:#94a3b8}
body.dark .nav-btn:hover,body.dark .nav-btn.active{background:#312e81;color:#a5b4fc}
.dark-toggle{border:none;background:#f1f5f9;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:1rem;transition:all .2s}
body.dark .dark-toggle{background:#1e293b}
main{max-width:1100px;margin:0 auto;padding:24px 16px}
/* PAGE: Home */
.hero{text-align:center;padding:80px 16px 60px}
.hero-badge{display:inline-block;background:#ede9fe;color:#4f46e5;font-size:.8rem;font-weight:600;padding:6px 16px;border-radius:999px;margin-bottom:24px}
.hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:900;line-height:1.1;margin-bottom:20px}
.hero h1 span{background:linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:1.15rem;color:#64748b;max-width:580px;margin:0 auto 40px;line-height:1.7}
body.dark .hero p{color:#94a3b8}
.cta-btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;padding:16px 36px;border-radius:16px;font-size:1.1rem;font-weight:700;cursor:pointer;box-shadow:0 8px 24px rgba(79,70,229,.35);transition:all .3s;font-family:inherit}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(79,70,229,.45)}
.feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:60px}
.feature-card{padding:32px 24px;border-radius:20px;text-align:center;cursor:pointer;transition:all .3s;border:none;background:none;font-family:inherit;width:100%;color:inherit}
.feature-card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.12)}
.feature-icon{font-size:2.5rem;margin-bottom:16px;display:block}
.feature-card h3{font-size:1.05rem;font-weight:700;margin-bottom:6px}
.feature-card p{font-size:.85rem;color:#64748b}
body.dark .feature-card p{color:#94a3b8}
/* PAGE: Chat */
.chat-wrap{max-width:800px;margin:0 auto;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;height:75vh;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.chat-header{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:18px 24px}
.chat-header h2{font-size:1.1rem;font-weight:700}
.chat-header p{font-size:.8rem;opacity:.8;margin-top:2px}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;background:rgba(248,250,252,.6)}
body.dark .chat-messages{background:rgba(15,23,42,.4)}
.chat-messages::-webkit-scrollbar{width:5px}
.chat-messages::-webkit-scrollbar-thumb{background:#6366f1;border-radius:3px}
.msg{max-width:80%;padding:12px 16px;border-radius:18px;font-size:.9rem;line-height:1.6;white-space:pre-wrap;animation:fadeUp .3s ease}
.msg.user{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:#fff;color:#1e293b;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
body.dark .msg.bot{background:#1e293b;color:#e2e8f0}
.chat-footer{padding:16px;background:#fff;border-top:1px solid #f1f5f9}
body.dark .chat-footer{background:#0f172a;border-color:#1e293b}
.quick-prompts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.qp-btn{border:1px solid #e0e7ff;background:#ede9fe;color:#4f46e5;padding:6px 12px;border-radius:999px;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.qp-btn:hover{background:#c7d2fe}
.chat-input-row{display:flex;gap:8px}
.chat-input{flex:1;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 16px;font-size:.9rem;font-family:inherit;outline:none;transition:border .2s;color:#1e293b}
body.dark .chat-input{background:#1e293b;border-color:#334155;color:#e2e8f0}
.chat-input:focus{border-color:#6366f1}
.send-btn{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;width:44px;border-radius:12px;font-size:1.1rem;cursor:pointer;transition:all .2s}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.typing{display:flex;gap:5px;align-items:center;padding:12px 16px;background:#fff;border-radius:18px;align-self:flex-start;box-shadow:0 2px 8px rgba(0,0,0,.08)}
body.dark .typing{background:#1e293b}
.dot{width:7px;height:7px;border-radius:50%;background:#6366f1;animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* PAGE: Timeline */
.tl-wrap{max-width:700px;margin:0 auto}
.page-title{text-align:center;margin-bottom:48px}
.page-title h1{font-size:2.5rem;font-weight:900;margin-bottom:8px}
.page-title p{color:#64748b}
body.dark .page-title p{color:#94a3b8}
.timeline{position:relative;padding-left:36px;border-left:2px solid #c7d2fe}
body.dark .timeline{border-color:#312e81}
.tl-item{position:relative;margin-bottom:24px}
.tl-dot{position:absolute;left:-43px;top:18px;width:16px;height:16px;border-radius:50%;border:3px solid;background:#fff}
body.dark .tl-dot{background:#0f172a}
.tl-dot.completed{border-color:#22c55e;background:#dcfce7}
.tl-dot.current{border-color:#4f46e5;background:#ede9fe;box-shadow:0 0 0 4px rgba(79,70,229,.2);animation:pulseRing 2s infinite}
.tl-dot.upcoming{border-color:#cbd5e1}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 4px rgba(79,70,229,.2)}50%{box-shadow:0 0 0 8px rgba(79,70,229,.1)}}
.tl-card{border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s}
.tl-card:hover{transform:translateX(4px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.tl-card-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.tl-badge{font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:999px;margin-bottom:4px;display:inline-block}
.badge-completed{background:#dcfce7;color:#16a34a}
.badge-current{background:#ede9fe;color:#4f46e5}
.badge-upcoming{background:#f1f5f9;color:#64748b}
.tl-card h3{font-size:1rem;font-weight:700;margin-top:4px}
.tl-arrow{color:#94a3b8;font-size:.85rem;transition:transform .2s}
.tl-body{padding:0 20px 16px;font-size:.88rem;color:#64748b;border-top:1px solid #f1f5f9;padding-top:12px;line-height:1.6}
body.dark .tl-body{color:#94a3b8;border-color:#1e293b}
/* PAGE: Guide */
.guide-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;margin-top:8px}
.guide-card{padding:36px 28px;border-radius:24px;position:relative;transition:all .3s}
.guide-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.12)}
.guide-num{position:absolute;top:-18px;left:-10px;width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:900;font-size:1.2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(79,70,229,.4)}
.guide-icon{font-size:3rem;margin-bottom:16px;display:block}
.guide-card h3{font-size:1.05rem;font-weight:700;margin-bottom:10px}
.guide-card p{font-size:.88rem;color:#64748b;line-height:1.7}
body.dark .guide-card p{color:#94a3b8}
/* PAGE: FAQ */
.faq-search{width:100%;padding:14px 20px;border-radius:14px;border:1.5px solid #e2e8f0;font-size:.95rem;font-family:inherit;background:#fff;outline:none;margin-bottom:24px;transition:border .2s;color:#1e293b}
body.dark .faq-search{background:#1e293b;border-color:#334155;color:#e2e8f0}
.faq-search:focus{border-color:#6366f1}
.faq-list{display:flex;flex-direction:column;gap:10px}
.faq-item{border-radius:16px;overflow:hidden}
.faq-q{width:100%;text-align:left;padding:18px 24px;display:flex;justify-content:space-between;align-items:center;border:none;background:none;font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer;color:inherit;transition:background .2s;gap:16px}
.faq-q:hover{background:rgba(79,70,229,.05)}
.faq-plus{font-size:1.4rem;color:#4f46e5;font-weight:300;transition:transform .3s;flex-shrink:0}
.faq-a{padding:0 24px 18px;font-size:.88rem;color:#64748b;line-height:1.7;border-top:1px solid #f1f5f9}
body.dark .faq-a{color:#94a3b8;border-color:#1e293b}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeUp .35s ease}
</style>
</head>
<body>
<nav class="glass">
  <button class="logo" onclick="showPage('home')"><span>✓</span>ElecGuide</button>
  <div class="nav-links">
    <button class="nav-btn active" id="nav-home" onclick="showPage('home')">🏠 Home</button>
    <button class="nav-btn" id="nav-chat" onclick="showPage('chat')">💬 Chat</button>
    <button class="nav-btn" id="nav-timeline" onclick="showPage('timeline')">📅 Timeline</button>
    <button class="nav-btn" id="nav-guide" onclick="showPage('guide')">✅ Guide</button>
    <button class="nav-btn" id="nav-faq" onclick="showPage('faq')">❓ FAQ</button>
  </div>
  <button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
</nav>
<main id="main"></main>

<script>
// ── State ────────────────────────────────────────────────────
let currentPage = '';
let dark = false;
let chatHistory = [{role:'bot', text:'👋 Hello! I\'m your Election Assistant.\nAsk me anything about Indian elections, how to vote, or what documents you need!'}];
let tlData = [], faqData = [], openTl = null, openFaq = 0;

// ── Dark Mode ────────────────────────────────────────────────
function toggleDark() {
  dark = !dark;
  document.body.classList.toggle('dark', dark);
  document.querySelector('.dark-toggle').textContent = dark ? '☀️' : '🌙';
}

// ── Page Router ──────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');
  const main = document.getElementById('main');
  main.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'page';
  if (page === 'home') div.innerHTML = renderHome();
  else if (page === 'chat') div.innerHTML = renderChat();
  else if (page === 'timeline') { div.innerHTML = renderTimeline(); loadTimeline(); }
  else if (page === 'guide') div.innerHTML = renderGuide();
  else if (page === 'faq') { div.innerHTML = renderFaq(); loadFaq(); }
  main.appendChild(div);
  if (page === 'chat') setupChat();
}

// ── Home ─────────────────────────────────────────────────────
function renderHome() {
  return `
<div class="hero">
  <div class="hero-badge">🇮🇳 India Election Education Platform</div>
  <h1>Understand Elections<br><span>in Minutes</span></h1>
  <p>Your simple, interactive guide to participating in Indian democracy. Clear, accessible, and free for everyone.</p>
  <button class="cta-btn" onclick="showPage('chat')">Start Learning →</button>
  <div class="feature-grid">
    <button class="feature-card glass" onclick="showPage('chat')">
      <span class="feature-icon">💬</span><h3>Chat Assistant</h3><p>Ask any election question in plain language</p>
    </button>
    <button class="feature-card glass" onclick="showPage('timeline')">
      <span class="feature-icon">📅</span><h3>Election Timeline</h3><p>Track all phases from announcement to results</p>
    </button>
    <button class="feature-card glass" onclick="showPage('guide')">
      <span class="feature-icon">✅</span><h3>How to Vote</h3><p>Step-by-step guide for first-time voters</p>
    </button>
    <button class="feature-card glass" onclick="showPage('faq')">
      <span class="feature-icon">❓</span><h3>FAQ</h3><p>Quick answers to common questions</p>
    </button>
  </div>
</div>`;
}

// ── Chat ─────────────────────────────────────────────────────
function renderChat() {
  return `
<div class="chat-wrap glass">
  <div class="chat-header">
    <h2>🤖 Election Chat Assistant</h2>
    <p>Ask anything about the Indian election process</p>
  </div>
  <div class="chat-messages" id="chat-msgs"></div>
  <div class="chat-footer">
    <div class="quick-prompts">
      <button class="qp-btn" onclick="sendMsg('How do elections work in India?')">How do elections work?</button>
      <button class="qp-btn" onclick="sendMsg('What are the steps to vote?')">Steps to vote?</button>
      <button class="qp-btn" onclick="sendMsg('What documents do I need?')">Documents needed?</button>
      <button class="qp-btn" onclick="sendMsg('How do I register to vote?')">How to register?</button>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Type your question…" onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button class="send-btn" id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>`;
}

function setupChat() {
  renderMessages();
}

function renderMessages() {
  const box = document.getElementById('chat-msgs');
  if (!box) return;
  box.innerHTML = chatHistory.map(m =>
    `<div class="msg ${m.role}">${m.text}</div>`
  ).join('');
  box.scrollTop = box.scrollHeight;
}

async function sendMsg(text) {
  const input = document.getElementById('chat-input');
  const msg = text || (input ? input.value.trim() : '');
  if (!msg) return;
  if (input) input.value = '';

  chatHistory.push({ role: 'user', text: msg });
  renderMessages();

  // Show typing
  const box = document.getElementById('chat-msgs');
  if (box) {
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.id = 'typing';
    typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    box.appendChild(typing);
    box.scrollTop = box.scrollHeight;
  }

  try {
    const r = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
    const d = await r.json();
    chatHistory.push({ role: 'bot', text: d.reply });
  } catch {
    chatHistory.push({ role: 'bot', text: '⚠️ Connection error. Please try again.' });
  }

  renderMessages();
}

// ── Timeline ─────────────────────────────────────────────────
function renderTimeline() {
  return `
<div class="tl-wrap">
  <div class="page-title"><h1>📅 Election Timeline</h1><p>Every phase of the election process explained</p></div>
  <div class="timeline" id="tl-list"><p style="color:#64748b;text-align:center;padding:40px">Loading…</p></div>
</div>`;
}

async function loadTimeline() {
  if (!tlData.length) {
    try { tlData = await (await fetch('/api/timeline')).json(); } catch { return; }
  }
  renderTl();
}

function renderTl() {
  const el = document.getElementById('tl-list');
  if (!el) return;
  el.innerHTML = tlData.map((e, i) => `
<div class="tl-item">
  <div class="tl-dot ${e.status}"></div>
  <div class="tl-card glass" onclick="toggleTl(${i})">
    <div class="tl-card-header">
      <div>
        <span class="tl-badge badge-${e.status}">${e.date}</span>
        <h3>${e.stage}</h3>
      </div>
      <span class="tl-arrow" id="tl-arrow-${i}">${openTl === i ? '▲' : '▼'}</span>
    </div>
    ${openTl === i ? `<div class="tl-body">${e.desc}</div>` : ''}
  </div>
</div>`).join('');
}

function toggleTl(i) { openTl = openTl === i ? null : i; renderTl(); }

// ── Guide ─────────────────────────────────────────────────────
function renderGuide() {
  const steps = [
    { n:1, i:'📝', t:'Voter Registration', d:'Register at voters.eci.gov.in (Form 6) or at your local Electoral Registration Office. You must be 18+ and an Indian citizen.' },
    { n:2, i:'🪪', t:'Get Your Voter ID (EPIC)', d:'You will receive your Electors Photo Identity Card (EPIC) after successful registration. Keep it safe — it is your primary voting document.' },
    { n:3, i:'📍', t:'Find Your Polling Booth', d:'Check your voter slip or search at electoralsearch.eci.gov.in to find your designated booth. You can only vote at that specific location.' },
    { n:4, i:'🗳️', t:'Cast Your Vote (EVM)', d:'At the booth: show your ID, get your finger marked with indelible ink, press your chosen candidate\'s button on the EVM, and verify the VVPAT slip shown for 7 seconds.' }
  ];
  return `
<div class="page-title"><h1>✅ Step-by-Step Voting Guide</h1><p>Everything you need to cast your vote successfully</p></div>
<div class="guide-grid">
${steps.map(s => `
<div class="guide-card glass">
  <div class="guide-num">${s.n}</div>
  <span class="guide-icon">${s.i}</span>
  <h3>${s.t}</h3>
  <p>${s.d}</p>
</div>`).join('')}
</div>`;
}

// ── FAQ ──────────────────────────────────────────────────────
function renderFaq() {
  return `
<div class="tl-wrap">
  <div class="page-title"><h1>❓ FAQ</h1><p>Quick answers to common election questions</p></div>
  <input class="faq-search glass" placeholder="🔍 Search questions…" oninput="filterFaq(this.value)"/>
  <div class="faq-list" id="faq-list"><p style="color:#64748b;text-align:center;padding:40px">Loading…</p></div>
</div>`;
}

async function loadFaq() {
  if (!faqData.length) {
    try { faqData = await (await fetch('/api/faq')).json(); } catch { return; }
  }
  renderFaqList(faqData);
}

function renderFaqList(data) {
  const el = document.getElementById('faq-list');
  if (!el) return;
  el.innerHTML = data.length ? data.map((f, i) => `
<div class="faq-item glass">
  <button class="faq-q" onclick="toggleFaq(${i})">
    ${f.q}
    <span class="faq-plus" style="transform:rotate(${openFaq===i?'45':'0'}deg)">+</span>
  </button>
  ${openFaq === i ? `<div class="faq-a">${f.a}</div>` : ''}
</div>`).join('') : '<p style="color:#64748b;text-align:center;padding:40px">No results found.</p>';
}

function toggleFaq(i) { openFaq = openFaq === i ? null : i; renderFaqList(faqData); }

function filterFaq(q) {
  const filtered = faqData.filter(f => f.q.toLowerCase().includes(q.toLowerCase()) || f.a.toLowerCase().includes(q.toLowerCase()));
  renderFaqList(filtered);
}

// ── Init ─────────────────────────────────────────────────────
showPage('home');
</script>
</body>
</html>
